[package]
name = "niwoec"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = "0.27"
egui = "0.27"
sysinfo = "0.30"
rfd = "0.14"
ort = "2.0.0-rc.1"
tokenizers = "0.19"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "z"      # optimize for size
lto = true
codegen-units = 1
